    <div><span class="text-error font-bold">Bahan Kurang:</span> <span class="missing-ing"></span></div>
    <hr class="border-white/10 my-1">

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchBtn = document.getElementById('search-btn');
            const ingredientsInput = document.getElementById('ingredients-input');
            const skeletonLoader = document.getElementById('skeleton-loader');
            const resultsSection = document.getElementById('results-section');
            const resultsGrid = document.getElementById('results-grid');
            const resultsSummary = document.getElementById('results-summary');
            const template = document.getElementById('recipe-card-template');

            // Handle Enter key
            ingredientsInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    searchBtn.click();
                }
            });

            searchBtn.addEventListener('click', async () => {
                const ingredients = ingredientsInput.value.trim();
                if (!ingredients) return;

                // UI State: Loading
                resultsSection.classList.add('hidden');
                skeletonLoader.classList.remove('hidden');
                searchBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Mencari...';
                searchBtn.disabled = true;

                try {
                    // API Call to FastAPI backend
                    const categoryFilter = document.getElementById('category-filter');
                    const sortFilter = document.getElementById('sort-filter');
                    
                    const response = await fetch('/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            ingredients: ingredients,
                            category: categoryFilter.value,
                            sort_by: sortFilter.value
                        })
                    });
                    
                    if (!response.ok) throw new Error("Network response was not ok");
                    const data = await response.json();
                    
                    renderResults(data.recommendations);
                } catch (error) {
                    console.error("Error fetching recipes:", error);
                    resultsSummary.textContent = "Terjadi kesalahan saat menghubungi server API.";
                    resultsSection.classList.remove('hidden');
                } finally {
                    // UI State: Complete
                    skeletonLoader.classList.add('hidden');
                    searchBtn.innerHTML = '<span class="material-symbols-outlined">search</span> Cari Resep';
                    searchBtn.disabled = false;
                }
            });

            function renderResults(recipes) {
                resultsGrid.innerHTML = '';
                
                if (!recipes || recipes.length === 0) {
                    resultsSummary.textContent = "Tidak ada resep yang cocok.";
                } else {
                    resultsSummary.textContent = `Ditemukan ${recipes.length} rekomendasi resep!`;
                    
                    recipes.forEach(recipe => {
                        const clone = template.content.cloneNode(true);
                        
                        clone.querySelector('.recipe-title').textContent = recipe.title;
                        clone.querySelector('.category-badge').textContent = recipe.category;
                        
                        const scorePercent = Math.round(recipe.similarity_score * 100);
                        clone.querySelector('.score-text').textContent = `${scorePercent}% Cocok`;
                        
                        const matchedCount = recipe.matched_ingredients.length;
                        const missingCount = recipe.missing_ingredients.length;
                        const total = matchedCount + missingCount;
                        clone.querySelector('.match-reason').textContent = `Direkomendasikan karena ${matchedCount} dari ${total} bahan tersedia.`;
                        
                        clone.querySelector('.loves-count').textContent = recipe.loves;
                        
                        clone.querySelector('.matched-ing').textContent = recipe.matched_ingredients.join(', ') || '-';
                        clone.querySelector('.missing-ing').textContent = recipe.missing_ingredients.join(', ') || '-';
                        clone.querySelector('.full-ing').textContent = recipe.ingredients.replace(/--/g, ', ');
                        clone.querySelector('.steps').textContent = recipe.steps;
                        clone.querySelector('.source-url').href = recipe.url;
                        
                        const btn = clone.querySelector('.detail-btn');
                        const panel = clone.querySelector('.detail-panel');
                        btn.addEventListener('click', function() {
                            if (panel.classList.contains('hidden')) {
                                panel.classList.remove('hidden');
                                panel.classList.add('flex');
                                btn.innerHTML = `Tutup Detail <span class="material-symbols-outlined text-[18px]">expand_less</span>`;
                            } else {
                                panel.classList.add('hidden');
                                panel.classList.remove('flex');
                                btn.innerHTML = `Lihat Detail <span class="material-symbols-outlined text-[18px]">expand_more</span>`;
                            }
                        });

                        resultsGrid.appendChild(clone);
                    });
                }
                
                resultsSection.classList.remove('hidden');
            }
        });
    </script>
